name: Django CI/CD Pipeline

on:
    push:
        branches:
            - main # main 브랜치에 push될 때 이 로봇이 작동합니다.

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            # 1. 깃허브 가상 컴퓨터로 내 소스코드 다운로드
            - name: Checkout code
              uses: actions/checkout@v4

            # 2. AWS 자격 증명 설정 (Secrets에 저장한 키 사용)
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY_ID }}
                  aws-region: ap-northeast-2

            # 3. AWS ECR 서비스 로그인
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            # 4. 도커 이미지 빌드 후 AWS ECR 창고로 Push
            - name: Build, tag, and push image to Amazon ECR
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: 14thdeploysession
                  IMAGE_TAG: latest
              run: |
                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            # 5. EC2 서버에 원격 접속(SSH)하여 최신 이미지로 교체 및 실행
            - name: SSH Remote Commands and Deploy
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USERNAME }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      # AWS ECR 로그인
                      aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin 946502786848.dkr.ecr.ap-northeast-2.amazonaws.com

                      # 기존 8000포트 컨테이너 멈추고 지우기 (없어도 에러 안 나게 대시'-' 처리 또는 무시하도록 설정)
                      sudo docker stop my-app || true
                      sudo docker rm my-app || true

                      # ECR에서 최신 장고 이미지 다운로드
                      sudo docker pull 946502786848.dkr.ecr.ap-northeast-2.amazonaws.com/14thdeploysession:latest

                      # 장고 전용 8000포트로 재가동!
                      sudo docker run -d -p 8000:8000 --name my-app 946502786848.dkr.ecr.ap-northeast-2.amazonaws.com/14thdeploysession:latest

                      # 안 쓰는 쓰레기 이미지 정리 (용량 확보)
                      sudo docker image prune -f
